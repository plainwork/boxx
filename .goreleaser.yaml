version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: boxx
    main: .
    binary: boxx
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      - { goos: darwin, goarch: arm }

archives:
  - id: default
    name_template: "boxx_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: false
  prerelease: auto
